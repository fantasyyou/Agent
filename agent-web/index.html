<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>安心金融客服</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="chat-shell">
    <header class="chat-header">
      <div class="agent-avatar">安</div>
      <div><h1>安心金融客服</h1><p><span class="online-dot"></span>智能客服在线</p></div>
    </header>
    <section id="messages" class="messages" aria-live="polite">
      <div class="message assistant"><div class="avatar">安</div><div class="bubble">您好，我是安心金融客服。请问有什么可以帮助您？</div></div>
    </section>
    <form id="chat-form" class="composer">
      <textarea id="question" rows="1" maxlength="2000" placeholder="请输入您的问题…" aria-label="输入问题" required></textarea>
      <button id="send" type="submit">发送</button>
    </form>
    <footer>回答由人工智能生成，涉及账户和交易信息请以业务系统为准</footer>
  </main>
  <script src="/app.js"></script>
</body>
</html>
